name: gcserevise
region: lon
services:
  - name: web
    dockerfile_path: Dockerfile
    github:
      repo: your-github-username/gcserevise
      branch: main
      deploy_on_push: true
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
    envs:
      - key: NEXT_PUBLIC_SUPABASE_URL
        value: ${NEXT_PUBLIC_SUPABASE_URL}
        type: GENERAL
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        value: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        type: GENERAL
      - key: NODE_ENV
        value: production
        type: GENERAL
